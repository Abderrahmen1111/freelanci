version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    env_file:
      - .env
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on: []

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  backend_media:
  backend_static:
